services:
  # Web dev server runs locally (pnpm dev) — too memory-hungry for Docker
  # web:
  #   container_name: ledger-core-web
  #   build:
  #     context: .
  #     dockerfile: web/Dockerfile
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   environment:
  #     NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  #   ports:
  #     - 3001:3001
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2g
  #   volumes:
  #     - ./web:/usr/local/ledger-core/web
  #     - ./packages/shared:/usr/local/ledger-core/packages/shared
  #     - /usr/local/ledger-core/web/node_modules

  api:
    container_name: ledger-core-api
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy
      temporal:
        condition: service_healthy
    env_file:
      - .env
    # The TigerBeetle Node.js client uses io_uring internally for communication with the server
    cap_add:
      - IPC_LOCK
    security_opt:
      - seccomp=unconfined
    environment:
      DB_HOST: ${DB_HOST}
      TB_HOST: ${TB_HOST}
      TB_PORT: ${TB_PORT}
    ports:
      - "3000:3000"
    volumes:
      - ./api:/usr/local/ledger-core/api
      - ./packages/shared:/usr/local/ledger-core/packages/shared
      - /usr/local/ledger-core/api/node_modules
    healthcheck:
      # wget makes an HTTP request (like curl but available in alpine by default)
      # --spider checks if the URL exists, don't download anything
      # -q — quiet, no output
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    container_name: ledger-core-db
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ledger-core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: ledger-core-redis
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - ledger-core-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Creates and formats the tigerbeetle data file. If already exists, skips this step
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    # Override entrypoint to use 'sh' for the logic check
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -f /data/0_0.tigerbeetle ]; then
          echo 'Data already formatted'
        else
          /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle
        fi
    volumes:
      - ledger-core-tigerbeetle-data:/data
    cap_add:
      - IPC_LOCK
    # seccomp=unconfined disables syscall filtering so TigerBeetle can use io_uring.
    # This is acceptable for local development only.
    # io_uring is a high-performance Linux I/O interface that batches disk read/write
    # operations instead of processing them one at a time. TigerBeetle requires it
    # for efficient data file access. Docker blocks it by default due to historical
    # security vulnerabilities in the io_uring subsystem.
    # PRODUCTION: Replace with a custom seccomp profile that only allows the syscalls TigerBeetle needs.
    # See: https://docs.docker.com/engine/security/seccomp/
    security_opt:
      - seccomp=unconfined

  tigerbeetle:
    container_name: ledger-core-tigerbeetle
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    command: start --addresses=0.0.0.0:3002 /data/0_0.tigerbeetle
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    cap_add:
      # Required for memory locking (Inter-Process Communication Lock)
      - IPC_LOCK
    # seccomp=unconfined disables syscall filtering so TigerBeetle can use io_uring.
    # This is acceptable for local development only.
    # io_uring is a high-performance Linux I/O interface that batches disk read/write
    # operations instead of processing them one at a time. TigerBeetle requires it
    # for efficient data file access. Docker blocks it by default due to historical
    # security vulnerabilities in the io_uring subsystem.
    # PRODUCTION: Replace with a custom seccomp profile that only allows the syscalls TigerBeetle needs.
    # See: https://docs.docker.com/engine/security/seccomp/
    security_opt:
      - seccomp=unconfined
    volumes:
      # Mount the local 'data' directory to the container's '/data' directory
      - ledger-core-tigerbeetle-data:/data
    healthcheck:
      # Checks if port 3002 is accepting connections
      test: ["CMD-SHELL", "nc -z 0.0.0.0:3002 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  temporal:
    container_name: ledger-core-temporal
    image: temporalio/auto-setup:1.27.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: db
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    container_name: ledger-core-temporal-ui
    image: temporalio/ui:2.36.2
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

volumes:
  ledger-core-db-data:
  ledger-core-redis-data:
  ledger-core-tigerbeetle-data:
