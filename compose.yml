services:
  web:
    container_name: ledger-core-web
    build:
      context: ./web
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      API_ENDPOINT: ${API_ENDPOINT}
    ports:
      - 3001:3001
    volumes:
      - ./web:/usr/local/ledger-core/web
      - /usr/local/ledger-core/web/node_modules

  api:
    container_name: ledger-core-api
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    volumes:
      - ./api:/usr/local/ledger-core/api
    healthcheck:
      # wget makes an HTTP request (like curl but available in alpine by default)
      # --spider checks if the URL exists, don't download anything
      # -q — quiet, no output
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    container_name: ledger-core-db
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ledger-core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: ledger-core-redis
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - ledger-core-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  ledger-core-db-data:
  ledger-core-redis-data:
